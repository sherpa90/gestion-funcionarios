<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SGPAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            /* slate-50 */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.15s ease-in-out;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            font-size: 0.875rem;
            color: #1e293b;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .form-input:focus+.input-icon {
            color: #3b82f6;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: #2563eb;
            color: #ffffff;
            font-weight: 500;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="h-full flex items-center justify-center p-4">
    <!-- Login Card -->
    <div class="login-card w-full max-w-md p-8 sm:p-10 relative z-10">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div
                class="mx-auto w-16 h-16 rounded-xl bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center shadow-lg mb-4">
                <i class="fas fa-clipboard-check text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Bienvenido</h1>
            <p class="text-sm text-slate-500">Sistema de Gestión de Permisos y Licencias</p>
        </div>

        <!-- Error Messages -->


        <!-- Login Form -->
        <form method="post" class="space-y-6">
            <input type="hidden" name="csrfmiddlewaretoken"
                value="CFhms4WPTVrdEJKMKTTQLe2BTynVqcZfsPeTmvFmriUXzd09hRNV68v53E5CaaLI">

            <!-- Email Input -->
            <div>
                <label for="id_username" class="block text-sm font-medium text-slate-700 mb-2">
                    Correo Institucional
                </label>
                <div class="input-group">
                    <input type="email" name="username" id="id_username" class="form-input"
                        placeholder="ejemplo@correo.cl" required autofocus>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

    </div>

    <!-- Password Input -->
    <div>
        <label for="id_password" class="block text-sm font-medium text-slate-700 mb-2">
            Contraseña
        </label>
        <div class="input-group">
            <input type="password" name="password" id="id_password" class="form-input" placeholder="••••••••" required>
            <i class="fas fa-lock input-icon"></i>
        </div>
    </div>

    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn-primary">
        <i class="fas fa-sign-in-alt mr-2"></i>
        Ingresar al Sistema
    </button>
    </form>

    <!-- Footer -->
    <div class="mt-8 text-center">
        <p class="text-xs text-gray-500">
            © 2026 Colegio Los Alerces. Todos los derechos reservados.
        </p>
    </div>
    </div>
</body>

</html>
